<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajedrez Pro - Agnes vs Rick</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- INTRO -->
    <div id="intro-video" class="video-overlay">
        <video id="video-player" muted controls>
            <source src="assets/video/intro.mp4" type="video/mp4">
        </video>
        <button id="skip-intro" onclick="skipIntro()">Saltar →</button>
    </div>

    <div class="container">

        <!-- INICIO -->
        <div id="screen-start" class="screen active">
            <img src="assets/images/logo.png" class="logo-img">
            <p class="subtitle">Elige tu oponente</p>

            <div class="characters">
                <div class="card" onclick="selectChar('agnes')">
                    <img src="assets/images/agnes.png" class="avatar-img">
                    <h2>Agnes</h2>
                </div>

                <div class="card" onclick="selectChar('rick')">
                    <img src="assets/images/rick.png" class="avatar-img">
                    <h2>Rick</h2>
                </div>
            </div>
        </div>

        <!-- DIFICULTAD -->
        <div id="screen-diff" class="screen">
            <h2 id="diff-title"></h2>

            <div class="diff-buttons">
                <button onclick="startGame('easy')">Fácil</button>
                <button onclick="startGame('medium')">Normal</button>
                <button onclick="startGame('hard')">Difícil</button>
            </div>

            <button onclick="goBack()">← Volver</button>
        </div>

        <!-- JUEGO -->
        <div id="screen-game" class="screen">
            <div id="board"></div>
            <button onclick="toMenu()">Salir</button>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script src="js/chess-engine.js" defer></script>
    <script src="js/ai.js" defer></script>
    <script src="js/game.js" defer></script>

    <!-- 🔥 FIX TOTAL -->
    <script>
    let selectedChar = null;

    function skipIntro() {
        const intro = document.getElementById("intro-video");
        intro.style.display = "none";

        const video = document.getElementById("video-player");
        if (video) {
            video.pause();
            video.currentTime = 0;
        }
    }

    // 👇 CAMBIAR PANTALLA
    function showScreen(id) {
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
    }

    // 👇 SELECCIÓN PERSONAJE
    function selectChar(char) {
        selectedChar = char;

        document.getElementById("diff-title").innerText = 
            "Elegiste: " + (char === "agnes" ? "Agnes" : "Rick");

        showScreen("screen-diff");
    }

    // 👇 INICIAR JUEGO
    function startGame(diff) {
        console.log("Personaje:", selectedChar);
        console.log("Dificultad:", diff);

        showScreen("screen-game");

        // Aquí luego puedes iniciar tu motor real
    }

    function goBack() {
        showScreen("screen-start");
    }

    function toMenu() {
        showScreen("screen-start");
    }
    </script>

</body>
</html>
